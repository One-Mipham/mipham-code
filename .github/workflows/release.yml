name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Stage 1: Build binaries (matrix) ──
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            runner: macos-latest
            binary: mipham-darwin-arm64
          - target: bun-darwin-x64
            runner: macos-latest
            binary: mipham-darwin-x64
          - target: bun-linux-x64
            runner: ubuntu-latest
            binary: mipham-linux-x64
          - target: bun-windows-x64
            runner: windows-latest
            binary: mipham-win-x64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: pnpm/action-setup@v4

      - run: pnpm install --frozen-lockfile

      - name: Build binary
        working-directory: apps/cli
        run: bun build --compile --minify --external react-devtools-core --target=${{ matrix.target }} ./bin/mipham.ts --outfile dist/${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: apps/cli/dist/${{ matrix.binary }}

  # ── Stage 2: Test ──
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: pnpm/action-setup@v4

      - run: pnpm install --frozen-lockfile

      - name: Install ripgrep
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep

      - working-directory: apps/cli
        run: bunx vitest run

  # ── Stage 3: npm Publish ──
  publish:
    name: npm Publish
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - run: pnpm install --frozen-lockfile

      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish to npm
        working-directory: apps/cli
        run: npm publish --access public

  # ── Stage 4: GitHub Release ──
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build, test]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact directory
        run: |
          mkdir -p release
          find dist -type f -name 'mipham-*' -exec cp {} release/ \;
          ls -lh release/

      - name: Generate changelog
        id: changelog
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          git log $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo HEAD~5)..HEAD --pretty=format:'- %s' > /tmp/changelog.txt || echo "- $TAG" > /tmp/changelog.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Mipham Code ${{ github.ref_name }}
          body_path: /tmp/changelog.txt
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
